server {
    listen 80;
    server_name localhost;
    
    # Enable Gzip compression for static files
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Root directory where the static files are stored
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy for API requests to the Django backend
    # This completely eliminates CORS issues because the browser thinks it's the same domain
    location /api/ {
        client_max_body_size 25M;
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy for Django Admin panel
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for Django static files (for admin panel CSS)
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }
}
