services:
  - type: web
    name: note-sharing-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py createsuperuser --username purnaacharya --email admin@example.com --noinput || true"
    startCommand: "gunicorn resourcesharing.wsgi:application"
    plan: free # Change to "starter" if you are using a paid tier
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Render defaults to an older version, explicitly set it to 3.10+
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*" # Or set to your render URL explicitly: "note-sharing-backend.onrender.com"
      - key: DATABASE_URL
        sync: false # You will provide this from Neon DB in the Render Dashboard
      - key: REDIS_URL
        sync: false # You will provide this from Upstash in the Render Dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false # You will provide your Vercel URL here in the Render Dashboard
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
